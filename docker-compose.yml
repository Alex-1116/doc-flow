services:
  ollama:
    image: ollama/ollama:latest
    container_name: docflow-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/localhost/11434' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  ollama-pull:
    image: ollama/ollama:latest
    container_name: docflow-ollama-pull
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: /bin/sh
    command: >
      -c "echo 'Pulling models...' && 
             ollama pull llama3 && 
             ollama pull bge-m3 && 
             echo 'Models pulled successfully!'"

  chromadb:
    image: chromadb/chroma:0.5.0
    container_name: docflow-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    container_name: docflow-backend
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_COLLECTION=docflow_documents
      - OLLAMA_TIMEOUT=300
      - REQUEST_TIMEOUT=300
      - MAX_CONCURRENT_UPLOADS=3
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  frontend:
    build: ./frontend
    container_name: docflow-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama-data:
  chroma-data:
