services:
  ollama:
    image: ollama/ollama:0.3.12
    container_name: docflow-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "ps"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s

  chromadb:
    image: chromadb/chroma:0.5.13
    container_name: docflow-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import chromadb; client = chromadb.HttpClient(host='localhost', port=8000); client.heartbeat(); print('OK')"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s

  backend:
    build: ./backend
    container_name: docflow-backend
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build: ./frontend
    container_name: docflow-frontend
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama-data:
  chroma-data:
